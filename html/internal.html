<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Internal JavaScript</title>
</head>
<body>
    <h2>Cách chèn Internal JavaScript</h2>
    <button id="btnInternal">Bấm vào đây</button>

    <script>
        // Lấy phần tử nút bấm và thêm sự kiện click
        document.getElementById('btnInternal').addEventListener('click', function() {
            alert('Bạn vừa bấm vào nút Internal JavaScript!');
        });
    </script>
</body>
</html>
